version: '3.8'

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis-server
    depends_on:
      - redis-server

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=redis-server
    depends_on:
      - redis-server

  redis-server:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  # THIS MUST BE ALIGNED WITH 'api', 'worker', and 'redis-server'
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3